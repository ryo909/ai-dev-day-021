<body><div id="app"><h1>Stakeholder Matrix Mapper</h1><p>関係者調整を4象限で整理するステークホルダーマトリクス。（話題:GitHub Trending (A）</p><div class="layout"><section class="panel"><h2>Add Item</h2><input id="matrixItemName" placeholder="項目名"><label>Impact <input id="impactRange" type="range" min="1" max="5" value="3"></label><label>Urgency <input id="urgencyRange" type="range" min="1" max="5" value="3"></label><button id="addMatrixItemBtn">配置する</button></section><section class="matrix"><div class="quad"><h3>High Impact / High Urgency</h3><ul id="qHH"></ul></div><div class="quad"><h3>High Impact / Low Urgency</h3><ul id="qHL"></ul></div><div class="quad"><h3>Low Impact / High Urgency</h3><ul id="qLH"></ul></div><div class="quad"><h3>Low Impact / Low Urgency</h3><ul id="qLL"></ul></div></section></div><p><a href="https://github.com/ryo909/ai-dev-day-021" target="_blank" rel="noopener">GitHub</a></p></div><script type="module" src="/src/main.js"></script></body></html>
